<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能康复系统 — Multi-Agent + RAG</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --accent: #38bdf8;
            --accent2: #818cf8;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --low: #22c55e;
            --mid: #f59e0b;
            --high: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Header ─────────────────────────────── */
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
        }
        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .logo {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: 700;
        }
        .header h1 { font-size: 20px; font-weight: 600; }
        .header p { font-size: 13px; color: var(--muted); margin-top: 2px; }

        /* ── Layout ─────────────────────────────── */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 24px;
        }
        @media (max-width: 800px) {
            .container { grid-template-columns: 1fr; }
        }

        /* ── Cards ──────────────────────────────── */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }
        .card-title {
            font-size: 15px; font-weight: 600;
            margin-bottom: 20px;
            display: flex; align-items: center; gap: 8px;
        }
        .card-title .icon { font-size: 18px; }

        /* ── Form ────────────────────────────────── */
        label {
            display: block;
            font-size: 13px; font-weight: 500;
            color: var(--muted);
            margin-bottom: 6px;
        }
        input, textarea, select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            padding: 10px 14px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color .2s;
        }
        input:focus, textarea:focus {
            border-color: var(--accent);
        }
        textarea { resize: vertical; min-height: 80px; }
        .field { margin-bottom: 16px; }
        .field-row { display: flex; gap: 12px; }
        .field-row .field { flex: 1; }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
        }
        .btn-primary:hover { opacity: .9; transform: translateY(-1px); }
        .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }

        /* ── Status bar ──────────────────────────── */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 10px;
            background: var(--bg);
            font-size: 13px;
        }
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status-bar.idle { display: none; }

        /* ── Result Area ─────────────────────────── */
        .result-area {
            min-height: 400px;
        }
        .placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            color: var(--muted);
            text-align: center;
        }
        .placeholder .big-icon { font-size: 48px; margin-bottom: 16px; opacity: .4; }
        .placeholder p { font-size: 14px; }

        /* ── Result Cards ────────────────────────── */
        .result-section { margin-bottom: 20px; }
        .result-section h3 {
            font-size: 14px; font-weight: 600;
            color: var(--accent);
            margin-bottom: 12px;
            display: flex; align-items: center; gap: 6px;
        }
        .result-section h3 .step {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px;
            background: var(--accent);
            color: var(--bg);
            border-radius: 6px;
            font-size: 12px; font-weight: 700;
        }

        .condition-chip {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 13px;
            margin: 3px 4px 3px 0;
            background: rgba(56, 189, 248, .12);
            border: 1px solid rgba(56, 189, 248, .25);
        }
        .condition-chip.high { background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.3); }
        .condition-chip.mid { background: rgba(245,158,11,.12); border-color: rgba(245,158,11,.3); }

        .risk-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 14px; font-weight: 600;
        }
        .risk-badge.low  { background: rgba(34,197,94,.15); color: var(--low); }
        .risk-badge.mid  { background: rgba(245,158,11,.15); color: var(--mid); }
        .risk-badge.high { background: rgba(239,68,68,.15); color: var(--high); }

        .risk-dims {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
        }
        .risk-dim {
            background: var(--bg);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 12px;
        }
        .risk-dim .label { color: var(--muted); margin-bottom: 4px; }
        .risk-dim .value { font-weight: 600; }
        .risk-dim .value.low { color: var(--low); }
        .risk-dim .value.mid { color: var(--mid); }
        .risk-dim .value.high { color: var(--high); }

        .phase-card {
            background: var(--bg);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 10px;
            border-left: 3px solid var(--accent);
        }
        .phase-card h4 { font-size: 14px; margin-bottom: 4px; }
        .phase-card .duration { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
        .activity {
            display: flex; gap: 10px;
            padding: 8px 0;
            border-top: 1px solid var(--border);
            font-size: 13px;
        }
        .activity:first-of-type { border-top: none; }
        .activity-name { font-weight: 600; color: var(--accent2); white-space: nowrap; }
        .activity-detail { color: var(--muted); }
        .activity-detail .freq {
            display: inline-block;
            background: rgba(129,140,248,.12);
            padding: 1px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-top: 3px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .info-item {
            background: var(--bg);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 12px;
        }
        .info-item .label { color: var(--muted); margin-bottom: 4px; }

        /* ── JSON toggle ─────────────────────────── */
        .json-toggle {
            margin-top: 16px;
            text-align: center;
        }
        .json-toggle button {
            background: none; border: 1px solid var(--border);
            color: var(--muted); border-radius: 8px;
            padding: 6px 16px; font-size: 12px; cursor: pointer;
        }
        .json-toggle button:hover { color: var(--text); border-color: var(--muted); }
        .json-block {
            margin-top: 12px;
            background: var(--bg);
            border-radius: 10px;
            padding: 16px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 11px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
            display: none;
        }
        .json-block.show { display: block; }

        /* ── Agent pipeline animation ────────────── */
        .pipeline {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-bottom: 20px;
        }
        .pipeline-node {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--muted);
            transition: all .3s;
        }
        .pipeline-node.active {
            background: rgba(56,189,248,.15);
            border-color: var(--accent);
            color: var(--accent);
        }
        .pipeline-node.done {
            background: rgba(34,197,94,.1);
            border-color: var(--low);
            color: var(--low);
        }
        .pipeline-arrow { color: var(--border); font-size: 12px; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-inner">
        <div class="logo">R</div>
        <div>
            <h1>智能康复分析系统</h1>
            <p>Multi-Agent + RAG | 语言 / 心理障碍评估</p>
        </div>
    </div>
</div>

<div class="container">
    <!-- ── Left: Input ───────────────────────── -->
    <div>
        <div class="card">
            <div class="card-title"><span class="icon">&#129657;</span> 患者信息输入</div>

            <div class="field-row">
                <div class="field">
                    <label>年龄</label>
                    <input type="number" id="age" value="10" min="1" max="18">
                </div>
                <div class="field">
                    <label>性别</label>
                    <select id="gender">
                        <option value="未知">未知</option>
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                </div>
            </div>

            <div class="field">
                <label>症状描述</label>
                <textarea id="symptoms" placeholder="例如：发音不清，语言表达困难，注意力不集中">发音不清，语言表达困难，注意力不集中</textarea>
            </div>

            <div class="field">
                <label>既往病史</label>
                <input type="text" id="history" value="无重大疾病史" placeholder="例如：早产史、家族遗传史等">
            </div>

            <button class="btn btn-primary" id="submitBtn" onclick="runAnalysis()">
                开始分析
            </button>

            <div class="status-bar idle" id="statusBar">
                <div class="spinner"></div>
                <span id="statusText">分析中...</span>
            </div>
        </div>

        <!-- Quick examples -->
        <div class="card" style="margin-top: 16px;">
            <div class="card-title"><span class="icon">&#128161;</span> 示例输入</div>
            <div style="display: flex; flex-direction: column; gap: 8px;">
                <button class="btn" style="background: var(--bg); border: 1px solid var(--border); color: var(--text); font-size: 12px; padding: 8px;" onclick="loadExample(0)">
                    发音不清 + 语言表达困难 + 注意力不集中
                </button>
                <button class="btn" style="background: var(--bg); border: 1px solid var(--border); color: var(--text); font-size: 12px; padding: 8px;" onclick="loadExample(1)">
                    特定场合不说话 + 社交回避
                </button>
                <button class="btn" style="background: var(--bg); border: 1px solid var(--border); color: var(--text); font-size: 12px; padding: 8px;" onclick="loadExample(2)">
                    重复音节 + 说话紧张 + 回避说话
                </button>
            </div>
        </div>
    </div>

    <!-- ── Right: Output ──────────────────────── -->
    <div class="card result-area" id="resultArea">
        <div class="placeholder" id="placeholder">
            <div class="big-icon">&#129656;</div>
            <p>输入患者信息后点击"开始分析"<br>系统将通过 RAG + 多Agent 协同分析</p>
        </div>
        <div id="resultContent" style="display:none;"></div>
    </div>
</div>

<script>
const DEMO_MODE = window.location.search.includes('demo');
const API_BASE = '';

const EXAMPLES = [
    { age: 10, symptoms: '发音不清，语言表达困难，注意力不集中', history: '无重大疾病史' },
    { age: 7,  symptoms: '特定场合不说话，社交回避，焦虑表现', history: '性格内向' },
    { age: 9,  symptoms: '重复音节或词语，延长发音，说话紧张，回避说话场景', history: '父亲幼时也有口吃' },
];

function loadExample(idx) {
    const e = EXAMPLES[idx];
    document.getElementById('age').value = e.age;
    document.getElementById('symptoms').value = e.symptoms;
    document.getElementById('history').value = e.history;
}

// ── Demo mock response ──────────────────────────
function getMockResponse(data) {
    // Match different symptom patterns
    const s = data.symptoms;
    if (s.includes('不说话') || s.includes('社交回避')) {
        return {
            patient: data,
            symptom_analysis: {
                possible_conditions: [
                    { name: 'Selective Mutism', confidence: '高', matching_symptoms: ['特定场合不说话','社交回避','焦虑表现'], unmatched_symptoms: [] },
                    { name: 'Social Communication Disorder', confidence: '低', matching_symptoms: ['社交回避'], unmatched_symptoms: ['特定场合不说话','焦虑表现'] },
                ],
                key_symptoms: ['特定场合不说话','社交回避','焦虑表现'],
                analysis_summary: '患者在特定社交场合持续无法说话，伴有明显焦虑，高度提示选择性缄默症。'
            },
            risk_assessment: {
                risk_level: '中', risk_score: 5,
                dimensions: {
                    communication_impact: { level: '中', description: '在特定场合沟通完全受限' },
                    social_impact: { level: '高', description: '社交回避严重影响同伴关系' },
                    academic_impact: { level: '中', description: '课堂上不发言影响参与度' },
                    emotional_impact: { level: '中', description: '焦虑情绪持续存在' },
                },
                risk_factors: ['社交广泛受限','焦虑持续'], protective_factors: ['家庭中语言正常','年龄小可塑性强'],
                urgency: '尽快干预', recommendation: '建议启动渐进暴露和认知行为疗法，家校协作建立安全感。'
            },
            rehab_plan: {
                diagnosis_summary: '选择性缄默症',
                rehab_plan: {
                    overall_goal: '逐步恢复社交场合的言语表达，降低焦虑水平',
                    duration_estimate: '3-6个月',
                    phases: [
                        { phase: '初期建立安全感', duration: '2-3周', objectives: ['建立信任关系','非言语互动'], activities: [
                            { name: '非言语沟通训练', description: '从点头、手势开始', frequency: '每日10分钟', method: '在安全环境中用非言语方式回应' },
                            { name: '渐进暴露', description: '逐步引入陌生人', frequency: '每周2次', method: '从家人→熟悉老师→陌生人阶梯式推进' },
                        ]},
                        { phase: '言语激活', duration: '4-6周', objectives: ['在更多场合发声','降低语言焦虑'], activities: [
                            { name: '录音回听', description: '录下自己说话并回听', frequency: '每周3次', method: '先录制独处时的声音，逐步在有小量听众时录音' },
                            { name: '认知行为疗法', description: '识别并挑战焦虑思维', frequency: '每周1次', method: '通过思维记录表和放松训练降低说话恐惧' },
                        ]},
                        { phase: '社交泛化', duration: '4-6周', objectives: ['在自然社交中说话','维持对话'], activities: [
                            { name: '社交技能训练', description: '在小组中练习', frequency: '每周2次', method: '2-3人小组进行结构化对话练习' },
                            { name: '家校协作', description: '统一策略', frequency: '持续', method: '建立家校一致的沟通期待和奖励机制' },
                        ]},
                    ]
                },
                home_practice: ['家长创造低压力说话机会','避免强迫说话','积极强化任何发声尝试','与学校保持沟通'],
                follow_up: { next_assessment: '4周后', monitoring_indicators: ['发声场合数量','焦虑自评分数','社交互动频率'] },
                precautions: ['绝不强迫或施压要求说话','避免在他人面前强调不说话的行为','关注共病焦虑的评估']
            },
            rag_sources: [{id:'KB004',disease:'Selective Mutism'},{id:'KB007',disease:'Social Communication Disorder'},{id:'KB003',disease:'ADHD'}]
        };
    }
    if (s.includes('重复音节') || s.includes('口吃') || s.includes('延长发音')) {
        return {
            patient: data,
            symptom_analysis: {
                possible_conditions: [
                    { name: 'Stuttering (Fluency Disorder)', confidence: '高', matching_symptoms: ['重复音节或词语','延长发音','说话紧张','回避说话场景'], unmatched_symptoms: [] },
                ],
                key_symptoms: ['重复音节或词语','延长发音','说话紧张','回避说话场景'],
                analysis_summary: '典型口吃表现，伴有说话紧张和场景回避，需及早干预防止慢性化。'
            },
            risk_assessment: {
                risk_level: '中', risk_score: 5,
                dimensions: {
                    communication_impact: { level: '高', description: '频繁口吃显著影响流畅沟通' },
                    social_impact: { level: '中', description: '回避说话场景影响社交参与' },
                    academic_impact: { level: '中', description: '课堂发言受影响' },
                    emotional_impact: { level: '高', description: '说话紧张和回避暗示情绪困扰' },
                },
                risk_factors: ['家族口吃史','伴有情绪困扰'], protective_factors: ['有治疗意识','家庭支持'],
                urgency: '尽快干预', recommendation: '建议启动流畅塑形和口吃修正训练，关注情绪脱敏。'
            },
            rehab_plan: {
                diagnosis_summary: '口吃（言语流畅性障碍），有家族史',
                rehab_plan: {
                    overall_goal: '提高言语流畅度，降低说话恐惧',
                    duration_estimate: '6-12个月',
                    phases: [
                        { phase: '流畅塑形训练', duration: '4-6周', objectives: ['掌握流畅技术','降低语速'], activities: [
                            { name: '慢速说话练习', description: '使用轻柔起音和连读', frequency: '每日15分钟', method: '从单句慢速朗读开始，逐步延长到段落' },
                            { name: '呼吸训练', description: '腹式呼吸和气息控制', frequency: '每日2次', method: '平躺感受腹式呼吸→坐位→站立→说话时应用' },
                        ]},
                        { phase: '口吃修正训练', duration: '4-8周', objectives: ['学会处理口吃时刻','减少恐惧'], activities: [
                            { name: '口吃修正技术', description: '在口吃时以可控方式完成', frequency: '每周2次', method: '练习 voluntarily stuttering（主动口吃）降低恐惧' },
                            { name: '脱敏训练', description: '逐步面对说话恐惧', frequency: '每周1次', method: '从低压力→高压力场景层级暴露' },
                        ]},
                        { phase: '维持与巩固', duration: '8-12周', objectives: ['日常中维持流畅','自信表达'], activities: [
                            { name: '真实场景练习', description: '在打电话、自我介绍等场景练习', frequency: '每周3次', method: '先预演后实战，记录成功经验' },
                        ]},
                    ]
                },
                home_practice: ['家长不做消极回应（不催促、不替说）','创造轻松说话环境','记录流畅说话的时刻','规律运动降低整体焦虑'],
                follow_up: { next_assessment: '6周后', monitoring_indicators: ['口吃频率（% syllable stuttered）','说话自评焦虑','回避场景数量'] },
                precautions: ['家长不以焦虑态度回应口吃','不要求"慢慢说"或"想好再说"','注意共病社交焦虑']
            },
            rag_sources: [{id:'KB008',disease:'Stuttering'},{id:'KB002',disease:'Speech Sound Disorder'},{id:'KB003',disease:'ADHD'}]
        };
    }
    // Default: DLD + ADHD
    return {
        patient: data,
        symptom_analysis: {
            possible_conditions: [
                { name: 'Developmental Language Disorder (DLD)', confidence: '高', matching_symptoms: ['语言表达困难','发音不清'], unmatched_symptoms: ['注意力不集中'] },
                { name: 'ADHD', confidence: '中', matching_symptoms: ['注意力不集中'], unmatched_symptoms: ['发音不清','语言表达困难'] },
            ],
            key_symptoms: ['发音不清','语言表达困难','注意力不集中'],
            analysis_summary: '患者表现为语言表达和语音方面的障碍，同时伴有注意力问题。主要考虑发育性语言障碍（DLD），需注意是否合并注意缺陷多动障碍（ADHD）。'
        },

// ── Main analysis function ──────────────────────
async function runAnalysis() {
    const btn = document.getElementById('submitBtn');
    const statusBar = document.getElementById('statusBar');
    const statusText = document.getElementById('statusText');
    const placeholder = document.getElementById('placeholder');
    const resultContent = document.getElementById('resultContent');

    const data = {
        age: parseInt(document.getElementById('age').value),
        symptoms: document.getElementById('symptoms').value,
        history: document.getElementById('history').value,
    };

    if (!data.symptoms.trim()) {
        alert('请输入症状描述');
        return;
    }

    // UI: loading state
    btn.disabled = true;
    statusBar.className = 'status-bar';
    placeholder.style.display = 'none';
    resultContent.style.display = 'block';
    resultContent.innerHTML = renderPipeline();

    let result;
    try {
        if (DEMO_MODE) {
            // Simulate pipeline steps with delays
            await step(0, 'RAG 检索中...', 600);
            await step(1, '症状分析中...', 800);
            await step(2, '风险评估中...', 700);
            await step(3, '生成方案中...', 900);
            result = getMockResponse(data);
        } else {
            statusText.textContent = '正在调用后端 API...';
            const resp = await fetch(API_BASE + '/analyze/full', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data),
            });
            if (!resp.ok) throw new Error('API error: ' + resp.status);
            result = await resp.json();
        }
    } catch (e) {
        // Fallback to demo mode
        statusText.textContent = '后端未连接，切换Demo模式...';
        await new Promise(r => setTimeout(r, 500));
        await step(0, 'RAG 检索中...', 400);
        await step(1, '症状分析中...', 600);
        await step(2, '风险评估中...', 500);
        await step(3, '生成方案中...', 700);
        result = getMockResponse(data);
    }

    // Render results
    resultContent.innerHTML = renderPipeline('done') + renderResult(result);

    btn.disabled = false;
    statusBar.className = 'status-bar idle';
    statusText.textContent = '分析完成';
}

async function step(nodeIdx, label, delay) {
    const statusText = document.getElementById('statusText');
    statusText.textContent = label;
    // Update pipeline nodes
    document.querySelectorAll('.pipeline-node').forEach((n, i) => {
        if (i < nodeIdx) { n.className = 'pipeline-node done'; }
        else if (i === nodeIdx) { n.className = 'pipeline-node active'; }
        else { n.className = 'pipeline-node'; }
    });
    await new Promise(r => setTimeout(r, delay));
}

function renderPipeline(state) {
    const nodes = ['RAG检索', '症状分析', '风险评估', '康复方案'];
    let html = '<div class="pipeline">';
    nodes.forEach((n, i) => {
        if (i > 0) html += '<span class="pipeline-arrow">→</span>';
        const cls = state === 'done' ? 'done' : '';
        html += `<span class="pipeline-node ${cls}">${n}</span>`;
    });
    html += '</div>';
    return html;
}

function renderResult(r) {
    const sa = r.symptom_analysis || {};
    const ra = r.risk_assessment || {};
    const rp = r.rehab_plan || {};
    const plan = rp.rehab_plan || {};

    // Risk level map
    const riskMap = { '低': 'low', '中': 'mid', '高': 'high' };
    const rl = riskMap[ra.risk_level] || 'mid';

    let html = '';

    // ── Step 1: Symptom Analysis ─────────────
    html += '<div class="result-section">';
    html += '<h3><span class="step">1</span> 症状分析</h3>';
    if (sa.possible_conditions) {
        sa.possible_conditions.forEach(c => {
            const conf = c.confidence === '高' ? 'high' : c.confidence === '中' ? 'mid' : '';
            html += `<span class="condition-chip ${conf}">${c.name}（${c.confidence}置信度）</span>`;
        });
    }
    if (sa.key_symptoms) {
        html += '<div style="margin-top:10px;font-size:13px;color:var(--muted)">关键症状：' + sa.key_symptoms.join(' / ') + '</div>';
    }
    if (sa.analysis_summary) {
        html += '<div style="margin-top:8px;font-size:13px;line-height:1.6">' + sa.analysis_summary + '</div>';
    }
    html += '</div>';

    // ── Step 2: Risk Assessment ──────────────
    html += '<div class="result-section">';
    html += '<h3><span class="step">2</span> 风险评估</h3>';
    html += `<span class="risk-badge ${rl}">${ra.risk_level}风险 · ${ra.risk_score}/10</span>`;
    if (ra.urgency) {
        html += ` <span style="font-size:12px;color:var(--muted);margin-left:8px">${ra.urgency}</span>`;
    }
    if (ra.dimensions) {
        html += '<div class="risk-dims">';
        const dimLabels = { communication_impact: '沟通影响', social_impact: '社交影响', academic_impact: '学业影响', emotional_impact: '情绪影响' };
        for (const [k, v] of Object.entries(ra.dimensions)) {
            const dl = riskMap[v.level] || 'mid';
            html += `<div class="risk-dim"><div class="label">${dimLabels[k] || k}</div><div class="value ${dl}">${v.level} — ${v.description}</div></div>`;
        }
        html += '</div>';
    }
    if (ra.recommendation) {
        html += '<div style="margin-top:10px;font-size:13px;background:var(--bg);padding:10px;border-radius:8px;">💡 ' + ra.recommendation + '</div>';
    }
    html += '</div>';

    // ── Step 3: Rehab Plan ───────────────────
    html += '<div class="result-section">';
    html += '<h3><span class="step">3</span> 康复方案</h3>';
    if (rp.overall_goal) {
        html += '<div style="font-size:13px;margin-bottom:4px"><strong>目标：</strong>' + rp.overall_goal + '</div>';
    }
    if (plan.duration_estimate) {
        html += '<div style="font-size:12px;color:var(--muted);margin-bottom:12px">预计周期：' + plan.duration_estimate + '</div>';
    }
    if (plan.phases) {
        plan.phases.forEach(ph => {
            html += '<div class="phase-card">';
            html += `<h4>${ph.phase}</h4>`;
            html += `<div class="duration">${ph.duration}</div>`;
            if (ph.activities) {
                ph.activities.forEach(a => {
                    html += '<div class="activity">';
                    html += '<div><span class="activity-name">' + a.name + '</span>';
                    html += '<div class="activity-detail">' + (a.description || '') + '<br><span class="freq">' + (a.frequency || '') + '</span></div>';
                    html += '<div style="margin-top:3px;font-size:12px">' + (a.method || '') + '</div>';
                    html += '</div></div>';
                });
            }
            html += '</div>';
        });
    }
    html += '</div>';

    // ── Extra info ───────────────────────────
    const extras = [];
    if (rp.home_practice && rp.home_practice.length) extras.push({ label: '家庭练习', items: rp.home_practice });
    if (rp.precautions && rp.precautions.length) extras.push({ label: '注意事项', items: rp.precautions });
    if (rp.follow_up && rp.follow_up.monitoring_indicators) extras.push({ label: '观察指标', items: rp.follow_up.monitoring_indicators });

    if (extras.length) {
        html += '<div class="result-section">';
        html += '<div class="info-grid">';
        extras.forEach(e => {
            html += '<div class="info-item"><div class="label">' + e.label + '</div>';
            html += e.items.map(i => '<div style="margin-top:3px">· ' + i + '</div>').join('');
            html += '</div>';
        });
        html += '</div></div>';
    }

    // ── RAG sources ──────────────────────────
    if (r.rag_sources && r.rag_sources.length) {
        html += '<div style="font-size:11px;color:var(--muted);margin-top:8px">知识来源：';
        html += r.rag_sources.map(s => s.id + ' ' + s.disease).join(' | ');
        html += '</div>';
    }

    // ── JSON toggle ──────────────────────────
    html += '<div class="json-toggle"><button onclick="toggleJson()">查看原始JSON</button></div>';
    html += '<div class="json-block" id="jsonBlock">' + JSON.stringify(r, null, 2).replace(/</g, '&lt;') + '</div>';

    return html;
}

function toggleJson() {
    document.getElementById('jsonBlock').classList.toggle('show');
}
</script>
